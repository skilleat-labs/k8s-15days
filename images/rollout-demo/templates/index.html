<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App {{ version }}</title>
    <style>
        {% if version == 'v1.0.0' %}
        body { background-color: #4A90D9; }
        {% elif version == 'v2.0.0' %}
        body { background-color: #27AE60; }
        {% elif version == 'v3.0.0' %}
        body { background-color: #E67E22; }
        {% else %}
        body { background-color: #95A5A6; }
        {% endif %}

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #333; }
        p  { font-size: 1.1rem; color: #555; margin: 6px 0; }
        .version-badge {
            display: inline-block;
            margin-top: 16px;
            padding: 6px 18px;
            border-radius: 20px;
            background: #333;
            color: #fff;
            font-size: 1rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>My App</h1>
        <p>Pod: <strong>{{ pod_name }}</strong></p>
        <div class="version-badge">{{ version }}</div>
    </div>
</body>
</html>
