apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-service
  namespace: team-a
  labels:
    team: a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-service
      team: a
  template:
    metadata:
      labels:
        app: my-service
        team: a
        version: v1.0.0
    spec:
      containers:
      - name: app
        image: skilleat/rollout-demo:v1.0.0
        ports:
        - containerPort: 8080
          name: http
