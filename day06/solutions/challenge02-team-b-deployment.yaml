apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-service
  namespace: team-b
  labels:
    team: b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-service
      team: b
  template:
    metadata:
      labels:
        app: my-service
        team: b
        version: v2.0.0
    spec:
      containers:
      - name: app
        image: skilleat/rollout-demo:v2.0.0
        ports:
        - containerPort: 8080
          name: http
