apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollout-demo
  annotations:
    kubernetes.io/change-cause: "v2.0.0 배포 - 초록 배경으로 업데이트"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: rollout-demo
  template:
    metadata:
      labels:
        app: rollout-demo
    spec:
      containers:
        - name: rollout-demo
          image: skilleat/rollout-demo:v2.0.0
          ports:
            - containerPort: 8080
