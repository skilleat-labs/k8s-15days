apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-rollingupdate
  annotations:
    kubernetes.io/change-cause: "v1.0.1로 롤백"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app
          image: skilleat/pod-info-app:v1.0.1
